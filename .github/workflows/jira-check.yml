name: Require Jira Ticket in PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-jira:
    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Check Jira ticket in PR title
        env:
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        run: |

          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $PR_TITLE"

          # Extract Jira ticket
          if [[ "$PR_TITLE" =~ ([A-Z]+-[0-9]+) ]]; then
            TICKET="${BASH_REMATCH[1]}"
            echo "Found ticket: $TICKET"
          else
            echo "❌ No Jira ticket found in PR title"
            exit 1
          fi

          echo "Checking Jira ticket..."

          # Encode email:token for Basic Auth
          AUTH=$(echo -n "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" | base64)

          HTTP_STATUS=$(curl -s \
            -H "Authorization: Basic $AUTH" \
            -H "Accept: application/json" \
            -o jira.json \
            -w "%{http_code}" \
            "${JIRA_BASE_URL}/rest/api/3/issue/${TICKET}")

          echo "HTTP Status from Jira: $HTTP_STATUS"

          if [[ "$HTTP_STATUS" == "200" ]]; then
            SUMMARY=$(jq -r '.fields.summary' jira.json)
            echo "✅ Valid Jira ticket: $TICKET - $SUMMARY"
          else
            echo "❌ Jira ticket not valid or authentication failed"
            echo "Jira Response:"
            cat jira.json
            exit 1
          fi
