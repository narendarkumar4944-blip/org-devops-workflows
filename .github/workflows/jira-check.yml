name: Require Jira Ticket in PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-jira:
    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Check Jira ticket in PR title
        env:
          JIRA_USER_EMAIL: ${{ vars.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ vars.JIRA_API_TOKEN }}
          JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
        run: |

          echo "Using Jira URL: $JIRA_BASE_URL"

          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $PR_TITLE"

          if [[ "$PR_TITLE" =~ ([A-Z]+-[0-9]+) ]]; then
            TICKET="${BASH_REMATCH[1]}"
            echo "Found ticket: $TICKET"
          else
            echo "❌ No Jira ticket found in PR title"
            exit 1
          fi

          HTTP_STATUS=$(curl -s -o jira.json -w "%{http_code}" \
            -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_BASE_URL/rest/api/3/issue/$TICKET")

          echo "HTTP Status: $HTTP_STATUS"
          cat jira.json

          if [[ "$HTTP_STATUS" == "200" ]]; then
            SUMMARY=$(jq -r '.fields.summary' jira.json)
            echo "✅ Valid Jira ticket: $TICKET - $SUMMARY"
          else
            echo "❌ Jira ticket not valid"
            exit 1
          fi
