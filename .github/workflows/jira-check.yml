name: Require Jira Ticket in PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-jira:
    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Check Jira ticket in PR title
        env:
          JIRA_USER_EMAIL: "narendarkumar4944@gmail.com"
          JIRA_API_TOKEN: "YOUR_TOKEN"
          JIRA_BASE_URL: "https://narendarkumar4944.atlassian.net"
        run: |

          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $PR_TITLE"

          if [[ $PR_TITLE =~ ([A-Z]+-[0-9]+) ]]; then
            TICKET="${BASH_REMATCH[1]}"
            echo "Found ticket: $TICKET"

            HTTP_STATUS=$(curl -s -o jira.json -w "%{http_code}" \
              -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${JIRA_BASE_URL}/rest/api/3/issue/${TICKET}" | tr -d '\n')

            echo "HTTP Status from Jira: $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ]; then
              SUMMARY=$(jq -r '.fields.summary' jira.json)
              echo "Valid Jira ticket: $TICKET - $SUMMARY"
            else
              echo "Jira ticket not valid"
              cat jira.json
              exit 1
            fi

          else
            echo "No Jira ticket found in PR title"
            exit 1
          fi

          
