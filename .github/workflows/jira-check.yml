name: Require Jira Ticket in PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-jira:
    runs-on: ubuntu-latest

    steps:
      - name: Check Jira ticket in PR title
        env:
          JIRA_USER_EMAIL: "narendarkumar4944@gmail.com"
          JIRA_API_TOKEN: "TATT3xFfGF0KFKBGu3iiGuuZVU3EDe-iGd-0Uk1-a4nTczSNmJiBL1K1OYhAaVifN1aJ54RPY97CQro9kvq0tts6p6gvHqBBz5BrEcmIy5aXwXG7xv7y0I0v3ylcdANKiR6h30EEV2zmE28giq2XEXokGNWxybO0wlHVDRrY3IUP-RG6gR-h14=AAD74724"
          JIRA_BASE_URL: "https://narendarkumar4944.atlassian.net"
        run: |

          PR_TITLE="${{ github.event.pull_request.title }}"

          echo "PR Title: $PR_TITLE"

          if [[ $PR_TITLE =~ ([A-Z]+-[0-9]+) ]]; then
            TICKET="${BASH_REMATCH[1]}"
            echo "Found ticket: $TICKET"

            HTTP_STATUS=$(curl -s -o jira.json -w "%{http_code}" \
              -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${JIRA_BASE_URL}/rest/api/3/issue/${TICKET}")

            if [[ "$HTTP_STATUS" == "200" ]]; then
              SUMMARY=$(jq -r '.fields.summary' jira.json)
              echo "Valid Jira ticket: $TICKET - $SUMMARY"
            else
              echo "Jira ticket not valid"
              exit 1
            fi

          else
            echo "No Jira ticket found in PR title"
            exit 1
          fi

